<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Top Navigation (Suppressed based on logic - Error State is a dead end/transactional view, prioritizing content canvas) -->
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-margin">
<div class="w-full max-w-md">
<!-- Error Card -->
<div class="bg-surface-container rounded-xl border border-outline-variant p-lg shadow-sm flex flex-col items-center text-center">
<!-- Icon -->
<div class="w-16 h-16 rounded-full bg-error-container/20 flex items-center justify-center mb-md">
<span class="material-symbols-outlined text-error text-[32px]" style="font-variation-settings: 'FILL' 1;">
                        error
                    </span>
</div>
<!-- Messaging -->
<h1 class="text-headline-md font-headline-md text-on-surface mb-sm">
                    Failed to load operational data
                </h1>
<p class="text-body-md font-body-md text-on-surface-variant mb-lg">
                    There was a problem retrieving the required data. This could be due to network connectivity issues or a corrupted local cache. Please try again.
                </p>
<!-- Actions -->
<div class="flex flex-col w-full gap-sm">
<button class="h-[44px] md:h-[36px] w-full bg-primary-container text-on-primary-container rounded flex items-center justify-center gap-sm px-md hover:bg-primary-container/90 transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background" type="button">
<span class="material-symbols-outlined text-[18px]">
                            refresh
                        </span>
<span class="text-label-md font-label-md">Retry Connection</span>
</button>
<button class="h-[44px] md:h-[36px] w-full bg-transparent border border-outline-variant text-on-surface rounded flex items-center justify-center gap-sm px-md hover:bg-surface-variant transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background" type="button">
<span class="material-symbols-outlined text-[18px]">
                            delete_sweep
                        </span>
<span class="text-label-md font-label-md">Clear Storage &amp; Reset</span>
</button>
</div>
<!-- Technical Details Accordion (Simulated) -->
<div class="w-full mt-lg pt-md border-t border-outline-variant text-left">
<button class="flex items-center justify-between w-full text-label-md font-label-md text-on-surface-variant hover:text-on-surface transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-surface-container rounded p-xs -ml-xs" type="button">
<span>View Technical Details</span>
<span class="material-symbols-outlined text-[18px]">
                            expand_more
                        </span>
</button>
<!-- Hidden by default in this state, shown here for structure completeness if expanded -->
<div class="hidden mt-sm p-sm bg-surface-container-lowest rounded border border-outline-variant font-mono text-[10px] leading-tight text-on-surface-variant overflow-x-auto">
                        ERR_CONNECTION_REFUSED<br/>
                        Timestamp: 2023-10-27T14:32:01Z<br/>
                        Endpoint: /api/v1/ops/manifest<br/>
                        Cache_Status: STALE
                    </div>
</div>
</div>
