<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Productivity Ops - Create/Edit Entry</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-lowest": "#0c0e16",
                        "surface-container": "#1d1f27",
                        "on-primary-fixed": "#00174b",
                        "tertiary-fixed": "#ffdbcd",
                        "inverse-primary": "#0053db",
                        "surface-dim": "#11131b",
                        "surface-tint": "#b4c5ff",
                        "primary": "#b4c5ff",
                        "outline": "#8d90a0",
                        "on-secondary-fixed-variant": "#39485a",
                        "tertiary-fixed-dim": "#ffb596",
                        "primary-container": "#2563eb",
                        "on-tertiary-container": "#ffede6",
                        "on-secondary-container": "#a7b6cc",
                        "on-tertiary": "#581e00",
                        "outline-variant": "#434655",
                        "on-primary": "#002a78",
                        "on-background": "#e1e2ed",
                        "on-tertiary-fixed": "#360f00",
                        "tertiary-container": "#bc4800",
                        "secondary-fixed": "#d4e4fa",
                        "on-error": "#690005",
                        "secondary": "#b9c8de",
                        "on-surface-variant": "#c3c6d7",
                        "primary-fixed": "#dbe1ff",
                        "secondary-fixed-dim": "#b9c8de",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary": "#ffb596",
                        "surface-bright": "#373942",
                        "background": "#11131b",
                        "on-secondary-fixed": "#0d1c2d",
                        "inverse-on-surface": "#2e3039",
                        "secondary-container": "#39485a",
                        "surface-container-high": "#282a32",
                        "error": "#ffb4ab",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "surface": "#11131b",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-low": "#191b23",
                        "on-surface": "#e1e2ed",
                        "on-error-container": "#ffdad6",
                        "surface-variant": "#32343d",
                        "error-container": "#93000a",
                        "on-secondary": "#233143",
                        "inverse-surface": "#e1e2ed",
                        "on-primary-container": "#eeefff",
                        "surface-container-highest": "#32343d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "base": "4px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "gutter": "16px",
                        "xl": "32px",
                        "touch-target": "44px",
                        "margin": "24px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "label-sm": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-sm": ["Inter"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "headline-lg": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "label-sm": ["11px", { "lineHeight": "14px", "letterSpacing": "0.02em", "fontWeight": "500" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "400" }],
                        "label-md": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "headline-sm": ["16px", { "lineHeight": "24px", "letterSpacing": "0", "fontWeight": "600" }],
                        "body-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0", "fontWeight": "400" }],
                        "body-sm": ["13px", { "lineHeight": "18px", "letterSpacing": "0.01em", "fontWeight": "400" }],
                        "headline-lg": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "headline-md": ["20px", { "lineHeight": "28px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0F172A; /* Level 0 Background */
            color: theme('colors.on-surface');
        }
    </style>
</head>
<body class="bg-[#0F172A] min-h-screen flex text-on-surface">
<!-- Canvas (Main Content) - Suppressed Navigation because it's a task-focused sub-page -->
<main class="flex-1 flex flex-col items-center justify-center p-margin w-full max-w-4xl mx-auto h-screen">
<!-- Form Card Level 1 Surface -->
<div class="bg-[#1E293B] border border-[#334155] rounded-lg w-full max-w-2xl overflow-hidden flex flex-col shadow-none">
<!-- Header -->
<div class="px-lg py-md border-b border-[#334155] flex justify-between items-center bg-[#1E293B]">
<div>
<h1 class="text-headline-md font-headline-md text-on-surface">New Entry</h1>
<p class="text-body-sm font-body-sm text-on-surface-variant mt-xs">Create a new operational record.</p>
</div>
<button class="text-on-surface-variant hover:text-on-surface h-touch-target w-touch-target flex items-center justify-center rounded-full hover:bg-[#334155] transition-colors focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:ring-offset-2 focus:ring-offset-[#1E293B]">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</div>
<!-- Form Content -->
<form class="p-lg flex flex-col gap-lg bg-[#1E293B]">
<!-- Title Field (Error State Example) -->
<div class="flex flex-col gap-xs relative">
<label class="text-label-md font-label-md text-on-surface" for="title">Title <span class="text-error">*</span></label>
<input aria-describedby="title-error" aria-invalid="true" class="bg-[#1E293B] border border-error text-on-surface rounded-DEFAULT px-md py-sm focus:outline-none focus:border-error focus:ring-2 focus:ring-error focus:ring-opacity-50 h-[36px] md:h-[36px] h-touch-target transition-all text-body-md font-body-md" id="title" name="title" placeholder="Enter record title" type="text" value="Q4 Integration"/>
<div class="flex items-center gap-xs text-error mt-xs" id="title-error">
<span class="material-symbols-outlined text-[14px]" data-icon="error">error</span>
<span class="text-label-sm font-label-sm">Title is required and must be unique.</span>
</div>
</div>
<!-- Description Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface" for="description">Description</label>
<textarea class="bg-[#1E293B] border border-[#334155] text-on-surface rounded-DEFAULT px-md py-sm focus:outline-none focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB] focus:ring-opacity-50 transition-all text-body-md font-body-md resize-y min-h-[100px]" id="description" name="description" placeholder="Provide detailed context for this entry..." rows="4"></textarea>
</div>
<!-- Status & Priority Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Status Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface" for="status">Status</label>
<div class="relative">
<select class="bg-[#1E293B] border border-[#334155] text-on-surface rounded-DEFAULT px-md py-sm appearance-none w-full focus:outline-none focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB] focus:ring-opacity-50 h-[36px] md:h-[36px] h-touch-target transition-all text-body-md font-body-md pr-xl" id="status" name="status">
<option value="draft">Draft</option>
<option value="active">Active</option>
<option value="archived">Archived</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Priority Field -->
<div class="flex flex-col gap-xs">
<label class="text-label-md font-label-md text-on-surface" for="priority">Priority</label>
<div class="relative">
<select class="bg-[#1E293B] border border-[#334155] text-on-surface rounded-DEFAULT px-md py-sm appearance-none w-full focus:outline-none focus:border-[#2563EB] focus:ring-2 focus:ring-[#2563EB] focus:ring-opacity-50 h-[36px] md:h-[36px] h-touch-target transition-all text-body-md font-body-md pr-xl" id="priority" name="priority">
<option value="low">Low</option>
<option selected="" value="medium">Medium</option>
<option value="high">High</option>
<option value="critical">Critical</option>
</select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
</form>
<!-- Footer Actions Level 1 Surface -->
<div class="px-lg py-md border-t border-[#334155] flex justify-end gap-md bg-[#1E293B]">
<button class="h-[36px] md:h-[36px] h-touch-target px-md rounded-DEFAULT border border-[#334155] text-on-surface bg-transparent hover:bg-[#334155] transition-colors focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:ring-offset-2 focus:ring-offset-[#1E293B] text-label-md font-label-md flex items-center justify-center" type="button">
                    Cancel
                </button>
<button class="h-[36px] md:h-[36px] h-touch-target px-md rounded-DEFAULT border-none text-white bg-[#2563EB] hover:bg-opacity-90 transition-colors focus:outline-none focus:ring-2 focus:ring-[#2563EB] focus:ring-offset-2 focus:ring-offset-[#1E293B] text-label-md font-label-md flex items-center justify-center" type="button">
                    Save Entry
                </button>
</div>
</div>
</main>
</body></html>
